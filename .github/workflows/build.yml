name: Build STM32MP157C-DK2 SD Card Image

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

env:
  BUILDROOT_VERSION: "2025.02.3"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      # ===========================================
      # 1. 释放磁盘空间（GitHub Runner 默认约 14GB 可用，
      #    Buildroot 完整编译可能需要 10GB+）
      # ===========================================
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h

      # ===========================================
      # 2. 安装 Buildroot 构建依赖
      # ===========================================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc g++ \
            make \
            patch \
            gzip bzip2 xz-utils \
            perl \
            cpio \
            unzip \
            rsync \
            file \
            bc \
            git \
            wget \
            python3 \
            libncurses-dev \
            libssl-dev

      # ===========================================
      # 3. 缓存 Buildroot 源码包下载目录
      # ===========================================
      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: ~/buildroot-dl
          key: br-dl-${{ env.BUILDROOT_VERSION }}-stm32mp157c-dk2
          restore-keys: |
            br-dl-${{ env.BUILDROOT_VERSION }}-
            br-dl-

      # ===========================================
      # 4. 缓存 ccache
      # ===========================================
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: br-ccache-${{ env.BUILDROOT_VERSION }}-${{ github.sha }}
          restore-keys: |
            br-ccache-${{ env.BUILDROOT_VERSION }}-

      # ===========================================
      # 5. 下载并解压 Buildroot
      # ===========================================
      - name: Download Buildroot
        run: |
          wget -q "https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.xz"
          tar xf "buildroot-${BUILDROOT_VERSION}.tar.xz"
          rm "buildroot-${BUILDROOT_VERSION}.tar.xz"

      # ===========================================
      # 6. 配置
      # ===========================================
      - name: Configure
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          make stm32mp157c_dk2_defconfig \
            BR2_DL_DIR="${HOME}/buildroot-dl"

      # ===========================================
      # 7. 编译
      # ===========================================
      - name: Build
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          make \
            BR2_DL_DIR="${HOME}/buildroot-dl" \
            BR2_CCACHE_DIR="${HOME}/.buildroot-ccache" \
            -j$(nproc)

      # ===========================================
      # 8. 查看产物
      # ===========================================
      - name: List output images
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          echo "=== Generated images ==="
          ls -lh output/images/

      # ===========================================
      # 9. 压缩镜像
      # ===========================================
      - name: Compress image
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          cd output/images
          xz -T0 -9 sdcard.img

      # ===========================================
      # 10. 上传 Artifact
      # ===========================================
      - name: Upload SD card image
        uses: actions/upload-artifact@v4
        with:
          name: stm32mp157c-dk2-sdcard
          path: buildroot-${{ env.BUILDROOT_VERSION }}/output/images/sdcard.img.xz
          retention-days: 30

      # ===========================================
      # 11. (可选) Tag 推送时自动创建 Release
      # ===========================================
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: buildroot-${{ env.BUILDROOT_VERSION }}/output/images/sdcard.img.xz
          generate_release_notes: true
