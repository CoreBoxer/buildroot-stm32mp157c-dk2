name: Build STM32MP157C-DK2 SD Card Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BUILDROOT_VERSION: "2026.02"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc g++ \
            make \
            patch \
            gzip bzip2 xz-utils \
            perl \
            cpio \
            unzip \
            rsync \
            file \
            bc \
            git \
            wget \
            python3 \
            libncurses-dev \
            libssl-dev

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: ~/buildroot-dl
          key: br-dl-${{ env.BUILDROOT_VERSION }}-stm32mp157c-dk2
          restore-keys: |
            br-dl-${{ env.BUILDROOT_VERSION }}-
            br-dl-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: br-ccache-${{ env.BUILDROOT_VERSION }}-${{ github.sha }}
          restore-keys: |
            br-ccache-${{ env.BUILDROOT_VERSION }}-

      - name: Download Buildroot
        run: |
          wget -q "https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.xz"
          tar xf "buildroot-${BUILDROOT_VERSION}.tar.xz"
          rm "buildroot-${BUILDROOT_VERSION}.tar.xz"

      # ===========================================
      # Configure：defconfig + fragment 注入
      # ===========================================
      - name: Configure
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          FRAGMENT="${GITHUB_WORKSPACE}/board/kernel-fragment.config"

          echo "=== Kernel config fragment ==="
          cat "${FRAGMENT}"

          # 加载官方 defconfig
          make stm32mp157c_dk2_defconfig \
            BR2_DL_DIR="${HOME}/buildroot-dl"

          # 注入 fragment 并更新配置
          make BR2_LINUX_KERNEL_CONFIG_FRAGMENT_FILES="${FRAGMENT}" \
            BR2_DL_DIR="${HOME}/buildroot-dl" \
            olddefconfig

          echo "=== Verifying .config ==="
          grep "FRAGMENT" .config

      # ===========================================
      # Build
      # ===========================================
      - name: Build
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          FRAGMENT="${GITHUB_WORKSPACE}/board/kernel-fragment.config"

          make \
            BR2_LINUX_KERNEL_CONFIG_FRAGMENT_FILES="${FRAGMENT}" \
            BR2_DL_DIR="${HOME}/buildroot-dl" \
            BR2_CCACHE_DIR="${HOME}/.buildroot-ccache" \
            -j$(nproc)

      - name: List output images
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          echo "=== Generated images ==="
          ls -lh output/images/

      - name: Verify kernel config
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          echo "=== Checking kernel config ==="
          for opt in CONFIG_DRM_FBDEV_EMULATION CONFIG_FB CONFIG_FRAMEBUFFER_CONSOLE; do
            if grep -q "^${opt}=y" output/build/linux-*/.config 2>/dev/null; then
              echo "  ✅ ${opt}=y"
            else
              echo "  ❌ ${opt} NOT enabled"
              grep "${opt}" output/build/linux-*/.config 2>/dev/null || echo "    (not found)"
            fi
          done

      - name: Compress image
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          cd output/images
          xz -T0 -9 sdcard.img

      - name: Upload SD card image
        uses: actions/upload-artifact@v4
        with:
          name: stm32mp157c-dk2-sdcard
          path: buildroot-${{ env.BUILDROOT_VERSION }}/output/images/sdcard.img.xz
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: buildroot-${{ env.BUILDROOT_VERSION }}/output/images/sdcard.img.xz
          generate_release_notes: true
