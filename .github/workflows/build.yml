name: Build STM32MP157C-DK2 SD Card Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BUILDROOT_VERSION: "2026.02"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      # ===========================================
      # 1. 检出仓库（获取 kernel-fragment.config）
      # ===========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===========================================
      # 2. 释放磁盘空间
      # ===========================================
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h

      # ===========================================
      # 3. 安装构建依赖
      # ===========================================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc g++ \
            make \
            patch \
            gzip bzip2 xz-utils \
            perl \
            cpio \
            unzip \
            rsync \
            file \
            bc \
            git \
            wget \
            python3 \
            libncurses-dev \
            libssl-dev

      # ===========================================
      # 4. 缓存下载目录
      # ===========================================
      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: ~/buildroot-dl
          key: br-dl-${{ env.BUILDROOT_VERSION }}-stm32mp157c-dk2
          restore-keys: |
            br-dl-${{ env.BUILDROOT_VERSION }}-
            br-dl-

      # ===========================================
      # 5. 缓存 ccache
      # ===========================================
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: br-ccache-${{ env.BUILDROOT_VERSION }}-${{ github.sha }}
          restore-keys: |
            br-ccache-${{ env.BUILDROOT_VERSION }}-

      # ===========================================
      # 6. 下载 Buildroot
      # ===========================================
      - name: Download Buildroot
        run: |
          wget -q "https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.xz"
          tar xf "buildroot-${BUILDROOT_VERSION}.tar.xz"
          rm "buildroot-${BUILDROOT_VERSION}.tar.xz"

      # ===========================================
      # 7. 配置（加载 defconfig + 注入内核片段）
      # ===========================================
      - name: Configure
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          OUTPUT_DIR="${GITHUB_WORKSPACE}/buildroot-${{ env.BUILDROOT_VERSION }}/output"
          
          # 加载官方 defconfig 并指定输出目录
          make O="${OUTPUT_DIR}" stm32mp157c_dk2_defconfig \
            BR2_DL_DIR="${HOME}/buildroot-dl"

          # 注入内核配置片段路径
          FRAGMENT="${GITHUB_WORKSPACE}/board/kernel-fragment.config"
          echo "Kernel config fragment contents:"
          cat "${FRAGMENT}"

          # 写入 Buildroot .config —— 注意路径要加 O=
          sed -i '/^BR2_LINUX_KERNEL_CONFIG_FRAGMENT_FILES=/d' "${OUTPUT_DIR}/.config"
          echo "BR2_LINUX_KERNEL_CONFIG_FRAGMENT_FILES=\"${FRAGMENT}\"" >> "${OUTPUT_DIR}/.config"

          # 重新解析使配置生效 —— 同样要加 O=
          make O="${OUTPUT_DIR}" olddefconfig

          # 验证
          grep "FRAGMENT" "${OUTPUT_DIR}/.config"

      # ===========================================
      # 8. 编译
      # ===========================================
      - name: Build
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          make \
            BR2_DL_DIR="${HOME}/buildroot-dl" \
            BR2_CCACHE_DIR="${HOME}/.buildroot-ccache" \
            -j$(nproc)

      # ===========================================
      # 9. 查看产物
      # ===========================================
      - name: List output images
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          echo "=== Generated images ==="
          ls -lh output/images/

      # ===========================================
      # 10. 验证内核配置确实生效
      # ===========================================
      - name: Verify kernel config
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          echo "=== Checking kernel config ==="
          for opt in CONFIG_DRM_FBDEV_EMULATION CONFIG_FB CONFIG_FRAMEBUFFER_CONSOLE; do
            if grep -q "^${opt}=y" output/build/linux-*/.config 2>/dev/null; then
              echo "  ✅ ${opt}=y"
            else
              echo "  ❌ ${opt} NOT enabled"
              grep "${opt}" output/build/linux-*/.config 2>/dev/null || echo "    (not found)"
            fi
          done

      # ===========================================
      # 11. 压缩镜像
      # ===========================================
      - name: Compress image
        working-directory: buildroot-${{ env.BUILDROOT_VERSION }}
        run: |
          cd output/images
          xz -T0 -9 sdcard.img

      # ===========================================
      # 12. 上传 Artifact
      # ===========================================
      - name: Upload SD card image
        uses: actions/upload-artifact@v4
        with:
          name: stm32mp157c-dk2-sdcard
          path: buildroot-${{ env.BUILDROOT_VERSION }}/output/images/sdcard.img.xz
          retention-days: 30

      # ===========================================
      # 13. Tag 推送时创建 Release
      # ===========================================
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: buildroot-${{ env.BUILDROOT_VERSION }}/output/images/sdcard.img.xz
          generate_release_notes: true
